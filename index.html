<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>몬티홀 실험</title>
  <style>
    :root {
      --bg: #f6f3ea;
      --panel: #fffdf7;
      --line: #d8d1bf;
      --text: #1f1f1f;
      --muted: #66604f;
      --accent: #7a5c2e;
      --good: #1f7a3d;
      --bad: #b23a2c;
      --door: #b58a52;
      --door-dark: #8f683a;
      --door-open: #d9d9d9;
      --selected: #e7d39e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .doors {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 18px 0 8px;
      flex-wrap: wrap;
    }

    .door {
      width: 150px;
      height: 220px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--door), var(--door-dark));
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15), 0 8px 18px rgba(0,0,0,0.12);
    }

    .door:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .door.selected {
      outline: 4px solid var(--selected);
      outline-offset: 2px;
    }

    .door.open {
      background: linear-gradient(180deg, var(--door-open), #bfbfbf);
      color: #222;
    }

    .door.prize::after,
    .door.goat::after {
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      font-size: 54px;
    }

    .door.prize::after { content: "🚗"; }
    .door.goat::after { content: "🐐"; }

    .door-label {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 17px;
    }

    .status {
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #f3efe3;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
    }

    .actions, .sim-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      justify-content: center;
    }

    button.control {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    button.control.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.control:disabled,
    .door:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #faf8f0;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 24px;
      font-weight: 800;
    }

    .big-stat {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #faf8f0;
    }

    .bars {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 64px 1fr 68px;
      gap: 10px;
      align-items: center;
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #e8e1d0;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: width 0.18s ease;
    }

    .fill.stay { background: var(--bad); }
    .fill.switch { background: var(--good); }

    .note {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .mini {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .result-win { color: var(--good); font-weight: 700; }
    .result-lose { color: var(--bad); font-weight: 700; }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .door { width: 120px; height: 180px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>몬티홀 실험</h1>
    <p class="sub">직접 한 판 해볼 수도 있고, 자동 반복 실험으로 “유지 ≈ 33%, 변경 ≈ 66%”가 되는지 확인할 수 있습니다.</p>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">직접 플레이</h2>

        <div class="doors" id="doors"></div>

        <div class="status" id="status">
          문 하나를 선택하세요.
        </div>

        <div class="actions">
          <button class="control" id="stayBtn" disabled>유지</button>
          <button class="control" id="switchBtn" disabled>변경</button>
          <button class="control primary" id="resetRoundBtn">새 게임</button>
        </div>

        <div class="note">
          규칙: 사회자는 상품 위치를 알고 있으며, 당신이 고르지 않은 문 중에서 반드시 꽝 문 하나를 열어줍니다.
        </div>
        <div class="mini" id="roundInfo"></div>
      </section>

      <aside class="card">
        <h2 class="section-title">통계</h2>

        <div class="stats">
          <div class="stat">
            <div class="label">직접 플레이 수</div>
            <div class="value" id="manualGames">0</div>
          </div>
          <div class="stat">
            <div class="label">자동 실험 수</div>
            <div class="value" id="autoGames">0</div>
          </div>
        </div>

        <div class="big-stat">
          <div class="label">총 실험 수</div>
          <div class="value" id="totalGames">0</div>
        </div>

        <div class="bars">
          <div class="bar-row">
            <div>유지</div>
            <div class="bar"><div class="fill stay" id="stayFill"></div></div>
            <div id="stayRate">0.0%</div>
          </div>
          <div class="bar-row">
            <div>변경</div>
            <div class="bar"><div class="fill switch" id="switchFill"></div></div>
            <div id="switchRate">0.0%</div>
          </div>
        </div>

        <div class="stats" style="margin-top:12px;">
          <div class="stat">
            <div class="label">유지 승리</div>
            <div class="value" id="stayWins">0</div>
          </div>
          <div class="stat">
            <div class="label">변경 승리</div>
            <div class="value" id="switchWins">0</div>
          </div>
        </div>

        <div class="sim-actions">
          <button class="control" data-run="10">자동 10회</button>
          <button class="control" data-run="100">자동 100회</button>
          <button class="control" data-run="1000">자동 1000회</button>
          <button class="control primary" id="resetStatsBtn">통계 초기화</button>
        </div>

        <div class="note">
          자동 실험은 매 판마다 랜덤하게 처음 선택을 한 뒤, 같은 조건에서 “유지했을 때”와 “변경했을 때”의 결과를 동시에 집계합니다.
        </div>
      </aside>
    </div>
  </div>

  <script>
    const doorsEl = document.getElementById("doors");
    const statusEl = document.getElementById("status");
    const roundInfoEl = document.getElementById("roundInfo");

    const stayBtn = document.getElementById("stayBtn");
    const switchBtn = document.getElementById("switchBtn");
    const resetRoundBtn = document.getElementById("resetRoundBtn");
    const resetStatsBtn = document.getElementById("resetStatsBtn");

    const manualGamesEl = document.getElementById("manualGames");
    const autoGamesEl = document.getElementById("autoGames");
    const totalGamesEl = document.getElementById("totalGames");
    const stayWinsEl = document.getElementById("stayWins");
    const switchWinsEl = document.getElementById("switchWins");
    const stayRateEl = document.getElementById("stayRate");
    const switchRateEl = document.getElementById("switchRate");
    const stayFillEl = document.getElementById("stayFill");
    const switchFillEl = document.getElementById("switchFill");

    const state = {
      prizeDoor: 0,
      pickedDoor: null,
      openedDoor: null,
      finalPhase: false,
      manualGames: 0,
      autoGames: 0,
      stayWins: 0,
      switchWins: 0
    };

    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function initRound() {
      state.prizeDoor = randInt(3);
      state.pickedDoor = null;
      state.openedDoor = null;
      state.finalPhase = false;
      renderDoors();
      statusEl.textContent = "문 하나를 선택하세요.";
      roundInfoEl.textContent = "";
      stayBtn.disabled = true;
      switchBtn.disabled = true;
    }

    function renderDoors(revealAll = false, finalChoice = null) {
      doorsEl.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        const btn = document.createElement("button");
        btn.className = "door";
        btn.innerHTML = `<span class="door-label">${i + 1}번 문</span>`;

        if (state.pickedDoor === i) btn.classList.add("selected");

        const isOpened = state.openedDoor === i;
        const shouldReveal = revealAll || isOpened;

        if (shouldReveal) {
          btn.classList.add("open");
          if (i === state.prizeDoor) btn.classList.add("prize");
          else btn.classList.add("goat");
        }

        if (finalChoice === i) {
          btn.style.boxShadow = "0 0 0 4px rgba(31,122,61,0.25), inset 0 0 0 2px rgba(255,255,255,0.15), 0 8px 18px rgba(0,0,0,0.12)";
        }

        btn.disabled = state.pickedDoor !== null || revealAll;
        btn.addEventListener("click", () => pickDoor(i));
        doorsEl.appendChild(btn);
      }
    }

    function pickDoor(index) {
      if (state.pickedDoor !== null) return;
      state.pickedDoor = index;

      const candidates = [0, 1, 2].filter(
        d => d !== state.pickedDoor && d !== state.prizeDoor
      );
      state.openedDoor = candidates[randInt(candidates.length)];

      renderDoors();
      stayBtn.disabled = false;
      switchBtn.disabled = false;
      statusEl.textContent = `사회자가 ${state.openedDoor + 1}번 문을 열었습니다. 이제 유지할지 변경할지 선택하세요.`;
      roundInfoEl.textContent = `현재 선택: ${state.pickedDoor + 1}번 문`;
    }

    function finishRound(mode) {
      if (state.pickedDoor === null || state.finalPhase) return;
      state.finalPhase = true;

      const finalChoice = mode === "stay"
        ? state.pickedDoor
        : [0, 1, 2].find(d => d !== state.pickedDoor && d !== state.openedDoor);

      const isWin = finalChoice === state.prizeDoor;

      state.manualGames += 1;
      if (mode === "stay" && isWin) state.stayWins += 1;
      if (mode === "switch" && isWin) state.switchWins += 1;

      renderDoors(true, finalChoice);
      stayBtn.disabled = true;
      switchBtn.disabled = true;

      const actionText = mode === "stay" ? "유지" : "변경";
      const resultClass = isWin ? "result-win" : "result-lose";
      const resultText = isWin ? "성공" : "실패";

      statusEl.innerHTML = `${actionText} 선택 결과: <span class="${resultClass}">${resultText}</span><br>정답은 ${state.prizeDoor + 1}번 문이었습니다.`;
      roundInfoEl.textContent = `최종 선택: ${finalChoice + 1}번 문 / 상품 위치: ${state.prizeDoor + 1}번 문`;

      updateStats();
    }

    function simulate(n) {
      let stayWinLocal = 0;
      let switchWinLocal = 0;

      for (let i = 0; i < n; i++) {
        const prize = randInt(3);
        const pick = randInt(3);

        if (pick === prize) stayWinLocal += 1;
        else switchWinLocal += 1;
      }

      state.autoGames += n;
      state.stayWins += stayWinLocal;
      state.switchWins += switchWinLocal;
      updateStats();

      statusEl.textContent = `자동 실험 ${n}회를 완료했습니다.`;
      roundInfoEl.textContent = `자동 실험에서는 같은 조건에서 유지와 변경의 결과를 각각 누적 비교합니다.`;
    }

    function updateStats() {
      const totalGames = state.manualGames + state.autoGames;
      const stayRate = totalGames === 0 ? 0 : (state.stayWins / totalGames) * 100;
      const switchRate = totalGames === 0 ? 0 : (state.switchWins / totalGames) * 100;

      manualGamesEl.textContent = state.manualGames.toLocaleString();
      autoGamesEl.textContent = state.autoGames.toLocaleString();
      totalGamesEl.textContent = totalGames.toLocaleString();
      stayWinsEl.textContent = state.stayWins.toLocaleString();
      switchWinsEl.textContent = state.switchWins.toLocaleString();

      stayRateEl.textContent = `${stayRate.toFixed(1)}%`;
      switchRateEl.textContent = `${switchRate.toFixed(1)}%`;

      stayFillEl.style.width = `${stayRate}%`;
      switchFillEl.style.width = `${switchRate}%`;
    }

    stayBtn.addEventListener("click", () => finishRound("stay"));
    switchBtn.addEventListener("click", () => finishRound("switch"));
    resetRoundBtn.addEventListener("click", initRound);

    resetStatsBtn.addEventListener("click", () => {
      state.manualGames = 0;
      state.autoGames = 0;
      state.stayWins = 0;
      state.switchWins = 0;
      updateStats();
      statusEl.textContent = "통계를 초기화했습니다. 문 하나를 선택하세요.";
      roundInfoEl.textContent = "";
    });

    document.querySelectorAll("[data-run]").forEach(btn => {
      btn.addEventListener("click", () => {
        const n = Number(btn.dataset.run);
        simulate(n);
      });
    });

    initRound();
    updateStats();
  </script>
</body>
</html>
